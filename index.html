<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>ITSLP – Gestión de Documentos</title>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;600;700;800&family=Open+Sans:wght@400;600&display=swap" rel="stylesheet"/>
  <style>
    :root {
      --azul: #003087;
      --azul-oscuro: #001f5b;
      --azul-medio: #1a4da0;
      --dorado: #C8A951;
      --dorado-claro: #e8c96a;
      --blanco: #ffffff;
      --gris-claro: #f4f6fb;
      --gris: #e0e4ef;
      --gris-texto: #6b7280;
      --rojo: #dc2626;
      --verde: #16a34a;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: 'Open Sans', sans-serif; background: var(--gris-claro); color: #1e293b; min-height: 100vh; }

    /* ── HEADER ── */
    .header {
      background: linear-gradient(135deg, var(--azul-oscuro) 0%, var(--azul) 60%, var(--azul-medio) 100%);
      padding: 0 2rem;
      display: flex; align-items: center; justify-content: space-between;
      height: 72px;
      box-shadow: 0 4px 20px rgba(0,30,90,0.4);
      position: sticky; top: 0; z-index: 100;
    }
    .header-left { display: flex; align-items: center; gap: 1rem; }
    .logo-circle {
      width: 48px; height: 48px; border-radius: 50%;
      background: var(--dorado);
      display: flex; align-items: center; justify-content: center;
      font-family: 'Montserrat', sans-serif;
      font-weight: 800; font-size: 13px; color: var(--azul-oscuro);
      letter-spacing: -0.5px; flex-shrink: 0;
    }
    .logo-tecnm {
      width: 48px; height: 48px; border-radius: 50%;
      background: white;
      display: flex; align-items: center; justify-content: center;
      font-family: 'Montserrat', sans-serif;
      font-weight: 800; font-size: 10px; color: var(--azul);
      letter-spacing: -0.5px; flex-shrink: 0;
    }
    .header-title { font-family: 'Montserrat', sans-serif; font-weight: 700; font-size: 1rem; color: white; line-height: 1.2; }
    .header-subtitle { font-size: 0.72rem; color: var(--dorado-claro); font-weight: 400; }
    .header-right { display: flex; align-items: center; gap: 1rem; }
    .badge-rol {
      background: var(--dorado); color: var(--azul-oscuro);
      font-family: 'Montserrat', sans-serif; font-weight: 700; font-size: 0.7rem;
      padding: 4px 12px; border-radius: 20px; letter-spacing: 0.5px;
    }
    .btn-logout {
      background: transparent; border: 1.5px solid rgba(255,255,255,0.4);
      color: white; padding: 6px 14px; border-radius: 8px;
      cursor: pointer; font-size: 0.8rem; font-family: 'Open Sans', sans-serif;
      transition: all .2s;
    }
    .btn-logout:hover { background: rgba(255,255,255,0.15); }

    /* ── LOGIN ── */
    .login-bg {
      min-height: 100vh;
      background: linear-gradient(145deg, var(--azul-oscuro) 0%, var(--azul) 50%, var(--azul-medio) 100%);
      display: flex; align-items: center; justify-content: center;
      padding: 2rem;
    }
    .login-card {
      background: white; border-radius: 20px;
      box-shadow: 0 25px 60px rgba(0,20,70,0.5);
      width: 100%; max-width: 420px;
      overflow: hidden;
    }
    .login-header {
      background: linear-gradient(135deg, var(--azul-oscuro), var(--azul-medio));
      padding: 2rem; text-align: center;
    }
    .login-logos { display: flex; justify-content: center; gap: 1.5rem; margin-bottom: 1rem; }
    .login-logo-circle {
      width: 64px; height: 64px; border-radius: 50%;
      background: var(--dorado);
      display: flex; align-items: center; justify-content: center;
      font-family: 'Montserrat', sans-serif;
      font-weight: 800; font-size: 16px; color: var(--azul-oscuro);
    }
    .login-logo-tecnm {
      width: 64px; height: 64px; border-radius: 50%;
      background: white;
      display: flex; align-items: center; justify-content: center;
      font-family: 'Montserrat', sans-serif;
      font-weight: 800; font-size: 12px; color: var(--azul); text-align: center; line-height: 1.2;
    }
    .login-title { color: white; font-family: 'Montserrat', sans-serif; font-size: 1.1rem; font-weight: 700; }
    .login-sub { color: var(--dorado-claro); font-size: 0.8rem; margin-top: 4px; }
    .login-body { padding: 2rem; }
    .form-group { margin-bottom: 1.2rem; }
    .form-label { display: block; font-size: 0.8rem; font-weight: 600; color: var(--azul); margin-bottom: 6px; }
    .form-input {
      width: 100%; padding: 10px 14px; border: 2px solid var(--gris);
      border-radius: 10px; font-size: 0.9rem; font-family: 'Open Sans', sans-serif;
      transition: border-color .2s; outline: none;
    }
    .form-input:focus { border-color: var(--azul); }
    .form-input.error { border-color: var(--rojo); }
    .error-msg { color: var(--rojo); font-size: 0.75rem; margin-top: 4px; }
    .btn-primary {
      width: 100%; padding: 12px;
      background: linear-gradient(135deg, var(--azul), var(--azul-medio));
      color: white; border: none; border-radius: 10px;
      font-family: 'Montserrat', sans-serif; font-weight: 700; font-size: 0.95rem;
      cursor: pointer; transition: all .2s; letter-spacing: 0.3px;
    }
    .btn-primary:hover { transform: translateY(-1px); box-shadow: 0 8px 20px rgba(0,48,135,0.4); }
    .btn-primary:disabled { opacity: 0.6; cursor: not-allowed; transform: none; }

    /* ── LAYOUT ── */
    .layout { display: flex; min-height: calc(100vh - 72px); }
    .sidebar {
      width: 240px; background: var(--azul-oscuro);
      padding: 1.5rem 0; flex-shrink: 0;
    }
    .sidebar-section { padding: 0.5rem 1rem; margin-bottom: 0.5rem; }
    .sidebar-section-title {
      font-size: 0.65rem; color: var(--dorado); font-family: 'Montserrat', sans-serif;
      font-weight: 700; letter-spacing: 1.5px; text-transform: uppercase;
      padding: 0 0.5rem; margin-bottom: 0.5rem;
    }
    .nav-item {
      display: flex; align-items: center; gap: 10px;
      padding: 10px 1rem; border-radius: 8px; margin: 2px 4px;
      color: rgba(255,255,255,0.7); font-size: 0.85rem; font-weight: 600;
      cursor: pointer; transition: all .2s; text-decoration: none;
    }
    .nav-item:hover { background: rgba(255,255,255,0.1); color: white; }
    .nav-item.active { background: var(--dorado); color: var(--azul-oscuro); }
    .nav-icon { font-size: 1rem; }

    /* ── CONTENT ── */
    .content { flex: 1; padding: 2rem; overflow-y: auto; }
    .page-title {
      font-family: 'Montserrat', sans-serif; font-weight: 800;
      font-size: 1.5rem; color: var(--azul-oscuro); margin-bottom: 1.5rem;
      display: flex; align-items: center; gap: 10px;
    }
    .page-title::after {
      content: ''; flex: 1; height: 3px;
      background: linear-gradient(90deg, var(--dorado), transparent);
      border-radius: 2px;
    }

    /* ── CARDS ── */
    .card {
      background: white; border-radius: 16px;
      box-shadow: 0 4px 20px rgba(0,30,90,0.08);
      padding: 1.5rem; margin-bottom: 1.5rem;
      border: 1px solid var(--gris);
    }
    .card-title {
      font-family: 'Montserrat', sans-serif; font-weight: 700;
      font-size: 1rem; color: var(--azul); margin-bottom: 1.2rem;
      padding-bottom: 0.8rem; border-bottom: 2px solid var(--gris);
    }

    /* ── FORMULARIOS ── */
    .form-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 1rem; }
    .form-grid .full { grid-column: 1 / -1; }
    .form-select {
      width: 100%; padding: 10px 14px; border: 2px solid var(--gris);
      border-radius: 10px; font-size: 0.9rem; font-family: 'Open Sans', sans-serif;
      transition: border-color .2s; outline: none; background: white;
    }
    .form-select:focus { border-color: var(--azul); }
    .form-select.error { border-color: var(--rojo); }
    .file-upload {
      border: 2px dashed var(--gris); border-radius: 10px;
      padding: 1.5rem; text-align: center; cursor: pointer;
      transition: all .2s; position: relative;
    }
    .file-upload:hover { border-color: var(--azul); background: rgba(0,48,135,0.03); }
    .file-upload input { position: absolute; inset: 0; opacity: 0; cursor: pointer; }
    .file-upload-icon { font-size: 2rem; margin-bottom: 0.5rem; }
    .file-upload-text { font-size: 0.85rem; color: var(--gris-texto); }
    .file-name { font-size: 0.8rem; color: var(--verde); font-weight: 600; margin-top: 6px; }

    /* ── BOTONES ── */
    .btn-row { display: flex; gap: 1rem; justify-content: flex-end; margin-top: 1.5rem; }
    .btn {
      padding: 10px 24px; border-radius: 10px; border: none;
      font-family: 'Montserrat', sans-serif; font-weight: 700; font-size: 0.85rem;
      cursor: pointer; transition: all .2s; display: flex; align-items: center; gap: 6px;
    }
    .btn-save {
      background: linear-gradient(135deg, var(--azul), var(--azul-medio));
      color: white;
    }
    .btn-save:hover { transform: translateY(-1px); box-shadow: 0 6px 16px rgba(0,48,135,0.35); }
    .btn-save:disabled { opacity: 0.6; cursor: not-allowed; transform: none; }
    .btn-cancel { background: var(--gris); color: #374151; }
    .btn-cancel:hover { background: #d1d5db; }
    .btn-view {
      background: linear-gradient(135deg, var(--dorado), var(--dorado-claro));
      color: var(--azul-oscuro); padding: 6px 14px; font-size: 0.75rem;
    }
    .btn-view:hover { transform: translateY(-1px); box-shadow: 0 4px 12px rgba(200,169,81,0.4); }
    .btn-danger { background: #fee2e2; color: var(--rojo); }
    .btn-danger:hover { background: #fecaca; }
    .btn-success { background: #dcfce7; color: var(--verde); }

    /* ── TABLA ── */
    .table-wrap { overflow-x: auto; border-radius: 12px; border: 1px solid var(--gris); }
    table { width: 100%; border-collapse: collapse; }
    thead { background: linear-gradient(135deg, var(--azul-oscuro), var(--azul)); }
    th {
      padding: 12px 16px; text-align: left; color: white;
      font-family: 'Montserrat', sans-serif; font-size: 0.75rem;
      font-weight: 700; letter-spacing: 0.5px; text-transform: uppercase;
    }
    td { padding: 12px 16px; font-size: 0.85rem; border-bottom: 1px solid var(--gris); }
    tr:last-child td { border-bottom: none; }
    tr:hover td { background: rgba(0,48,135,0.03); }
    .tag {
      display: inline-block; padding: 3px 10px; border-radius: 20px;
      font-size: 0.7rem; font-weight: 700; font-family: 'Montserrat', sans-serif;
    }
    .tag-azul { background: #dbeafe; color: var(--azul); }
    .tag-verde { background: #dcfce7; color: var(--verde); }
    .tag-dorado { background: #fef9c3; color: #92400e; }

    /* ── SEARCH ── */
    .search-bar {
      display: flex; gap: 1rem; align-items: flex-end; margin-bottom: 1.5rem;
    }
    .search-bar .form-group { flex: 1; margin-bottom: 0; }
    .btn-search {
      padding: 10px 24px;
      background: linear-gradient(135deg, var(--azul), var(--azul-medio));
      color: white; border: none; border-radius: 10px;
      font-family: 'Montserrat', sans-serif; font-weight: 700; font-size: 0.85rem;
      cursor: pointer; white-space: nowrap; transition: all .2s;
    }
    .btn-search:hover { transform: translateY(-1px); box-shadow: 0 6px 16px rgba(0,48,135,0.35); }

    /* ── STATS ── */
    .stats-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 1rem; margin-bottom: 1.5rem; }
    .stat-card {
      background: white; border-radius: 16px; padding: 1.2rem;
      border: 1px solid var(--gris); box-shadow: 0 4px 12px rgba(0,30,90,0.06);
      display: flex; align-items: center; gap: 1rem;
    }
    .stat-icon {
      width: 50px; height: 50px; border-radius: 12px;
      background: linear-gradient(135deg, var(--azul), var(--azul-medio));
      display: flex; align-items: center; justify-content: center;
      font-size: 1.3rem; flex-shrink: 0;
    }
    .stat-val { font-family: 'Montserrat', sans-serif; font-weight: 800; font-size: 1.6rem; color: var(--azul-oscuro); }
    .stat-label { font-size: 0.75rem; color: var(--gris-texto); font-weight: 600; }

    /* ── ALERTS ── */
    .alert {
      padding: 12px 16px; border-radius: 10px; margin-bottom: 1rem;
      font-size: 0.85rem; font-weight: 600; display: flex; align-items: center; gap: 8px;
    }
    .alert-success { background: #dcfce7; color: var(--verde); border: 1px solid #bbf7d0; }
    .alert-error { background: #fee2e2; color: var(--rojo); border: 1px solid #fecaca; }
    .alert-info { background: #dbeafe; color: var(--azul); border: 1px solid #bfdbfe; }

    /* ── MODAL PDF ── */
    .modal-overlay {
      position: fixed; inset: 0; background: rgba(0,0,30,0.75);
      display: flex; align-items: center; justify-content: center;
      z-index: 200; padding: 1rem;
    }
    .modal {
      background: white; border-radius: 16px;
      width: 100%; max-width: 900px; max-height: 90vh;
      display: flex; flex-direction: column;
      box-shadow: 0 25px 60px rgba(0,0,0,0.4);
      overflow: hidden;
    }
    .modal-header {
      background: linear-gradient(135deg, var(--azul-oscuro), var(--azul));
      padding: 1rem 1.5rem; display: flex; align-items: center; justify-content: space-between;
    }
    .modal-title { color: white; font-family: 'Montserrat', sans-serif; font-weight: 700; }
    .modal-close {
      background: rgba(255,255,255,0.2); border: none; color: white;
      width: 32px; height: 32px; border-radius: 8px; cursor: pointer;
      font-size: 1.1rem; display: flex; align-items: center; justify-content: center;
      transition: background .2s;
    }
    .modal-close:hover { background: rgba(255,255,255,0.35); }
    .modal-body { flex: 1; overflow: auto; }
    .modal-body iframe { width: 100%; height: 75vh; border: none; }

    /* ── EMPTY ── */
    .empty { text-align: center; padding: 3rem; color: var(--gris-texto); }
    .empty-icon { font-size: 3rem; margin-bottom: 1rem; }
    .empty-text { font-size: 0.9rem; }

    /* ── LOADING ── */
    .spinner {
      width: 20px; height: 20px; border: 3px solid rgba(255,255,255,0.3);
      border-top-color: white; border-radius: 50%;
      animation: spin 0.7s linear infinite; display: inline-block;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    /* ── HAMBURGER ── */
    .hamburger {
      display: none; background: transparent; border: none;
      color: white; font-size: 1.5rem; cursor: pointer; padding: 4px;
    }

    /* ── DRAWER OVERLAY ── */
    .drawer-overlay {
      display: none; position: fixed; inset: 0;
      background: rgba(0,0,0,0.55); z-index: 200;
    }
    .drawer-overlay.open { display: block; }
    .drawer {
      position: fixed; top: 0; left: -270px; bottom: 0; width: 250px;
      background: var(--azul-oscuro); z-index: 210;
      transition: left .3s ease; overflow-y: auto; padding: 1rem 0;
    }
    .drawer.open { left: 0; }
    .drawer-header {
      display: flex; justify-content: space-between; align-items: center;
      padding: 0.5rem 1rem 1rem;
    }
    .drawer-header span { color: var(--dorado); font-family: 'Montserrat', sans-serif; font-weight: 700; font-size: 0.85rem; }
    .drawer-close-btn {
      background: rgba(255,255,255,0.15); border: none; color: white;
      width: 30px; height: 30px; border-radius: 8px; cursor: pointer; font-size: 1rem;
    }

    /* ── BOTTOM NAV ── */
    .bottom-nav {
      display: none; position: fixed; bottom: 0; left: 0; right: 0;
      background: var(--azul-oscuro); z-index: 150;
      padding: 6px 0 env(safe-area-inset-bottom, 8px);
      box-shadow: 0 -4px 20px rgba(0,20,70,0.4);
      border-top: 1px solid rgba(255,255,255,0.1);
    }
    .bottom-nav-items { display: flex; justify-content: space-around; }
    .bottom-nav-item {
      display: flex; flex-direction: column; align-items: center; gap: 2px;
      color: rgba(255,255,255,0.55); font-size: 0.58rem; font-weight: 700;
      font-family: 'Montserrat', sans-serif; cursor: pointer;
      padding: 5px 8px; border-radius: 10px; transition: all .2s;
      text-transform: uppercase; letter-spacing: 0.3px; min-width: 55px;
    }
    .bottom-nav-item .bnav-icon { font-size: 1.25rem; }
    .bottom-nav-item.active { color: var(--dorado); }

    @media (max-width: 768px) {
      .sidebar { display: none; }
      .hamburger { display: block; }
      .bottom-nav { display: block; }
      .content { padding: 1rem; padding-bottom: 85px; }
      .form-grid { grid-template-columns: 1fr; }
      .stats-grid { grid-template-columns: 1fr 1fr; gap: 0.75rem; }
      .stat-card { padding: 0.85rem; }
      .stat-val { font-size: 1.3rem; }
      .header { padding: 0 1rem; height: 60px; }
      .header-title { font-size: 0.82rem; }
      .header-subtitle { font-size: 0.62rem; }
      .logo-circle, .logo-tecnm { width: 34px; height: 34px; font-size: 9px; }
      .header-left { gap: 0.5rem; }
      .badge-rol { display: none; }
      .btn-logout { font-size: 0.72rem; padding: 5px 10px; }
      .page-title { font-size: 1.15rem; }
      .card { padding: 1rem; }
      .search-bar { flex-direction: column; align-items: stretch; }
      .btn-search { width: 100%; padding: 12px; }
      .table-wrap { font-size: 0.78rem; }
      th, td { padding: 8px 10px; }
      .btn-row { flex-direction: column; }
      .btn-row .btn { width: 100%; justify-content: center; }
      .modal { max-height: 96vh; border-radius: 12px 12px 0 0; align-self: flex-end; }
      .modal-body iframe { height: 65vh; }
    }
    @media (max-width: 400px) {
      .stats-grid { grid-template-columns: 1fr; }
    }

    /* ── EDIT MODAL ── */
    .edit-modal-overlay {
      position: fixed; inset: 0; background: rgba(0,0,30,0.75);
      display: flex; align-items: center; justify-content: center;
      z-index: 300; padding: 1rem;
    }
    .edit-modal {
      background: white; border-radius: 16px;
      width: 100%; max-width: 520px;
      box-shadow: 0 25px 60px rgba(0,0,0,0.4);
      overflow: hidden;
    }
    .edit-modal-header {
      background: linear-gradient(135deg, var(--azul-oscuro), var(--azul));
      padding: 1rem 1.5rem; display: flex; align-items: center; justify-content: space-between;
    }
    .edit-modal-title { color: white; font-family: 'Montserrat', sans-serif; font-weight: 700; }
    .edit-modal-body { padding: 1.5rem; }
    .edit-modal-footer { padding: 1rem 1.5rem; display: flex; gap: 1rem; justify-content: flex-end; border-top: 1px solid var(--gris); }
  </style>
</head>
<body>

<div id="app"></div>

<!-- Drawer y Bottom Nav persistentes (no se re-renderizan) -->
<div class="drawer-overlay" id="drawer-overlay">
  <div class="drawer" id="drawer">
    <div class="drawer-header">
      <span>📋 MENÚ</span>
      <button class="drawer-close-btn" id="drawer-close">✕</button>
    </div>
    <div id="drawer-nav-content"></div>
  </div>
</div>

<nav class="bottom-nav" id="bottom-nav">
  <div class="bottom-nav-items" id="bottom-nav-items"></div>
</nav>

<script>
const { createClient } = supabase;
const sb = createClient(
  'https://kyxedjejepgfxynfzxfi.supabase.co',
  'sb_publishable_3-HAhCGvcaeXiWhLnd69WA_XTxj9Vs0'
);

// ── STATE ──
let state = {
  user: null,
  role: null,
  view: 'dashboard',
  alert: null,
  pdfUrl: null,
  pdfTitle: null,
  periodos: [],
  documentos: [],
  usuarios: [],
  stats: { docs: 0, periodos: 0, usuarios: 0 },
  searchRfc: '',
  searchResults: null,
  loading: false,
};

function setState(patch) {
  Object.assign(state, patch);
  render();
  updateDrawerAndNav();
}

function updateDrawerAndNav() {
  if (!state.user) {
    document.getElementById('bottom-nav').style.display = 'none';
    return;
  }
  document.getElementById('bottom-nav').style.display = 'block';

  // Update drawer nav
  const navItems = getNavItems();
  const drawerContent = document.getElementById('drawer-nav-content');
  if (drawerContent) {
    drawerContent.innerHTML = navItems.map(section =>
      '<div class="sidebar-section">' +
        '<div class="sidebar-section-title">' + section.title + '</div>' +
        section.items.map(item =>
          '<div class="nav-item ' + (state.view === item.view ? 'active' : '') + '" data-view="' + item.view + '" data-drawer="true">' +
            '<span class="nav-icon">' + item.icon + '</span> ' + item.label +
          '</div>'
        ).join('') +
      '</div>'
    ).join('');
    // Rebind drawer nav items
    drawerContent.querySelectorAll('.nav-item[data-drawer]').forEach(el => {
      el.addEventListener('click', async () => {
        closeDrawer();
        const v = el.dataset.view;
        if (v === 'cons-doc') setState({ view: v, searchResults: null, searchRfc: '' });
        else setState({ view: v, alert: null });
        if (['adm-docs', 'reg-doc'].includes(v)) {
          const [periodos, documentos, stats] = await Promise.all([loadPeriodos(), loadDocumentos(), loadStats()]);
          setState({ periodos, documentos, stats });
        }
        if (v === 'adm-usuarios') setState({ usuariosList: [] });
      });
    });
  }

  // Update bottom nav
  const r = state.role;
  const bnavItems = [];
  bnavItems.push({ view: 'dashboard', icon: '🏠', label: 'Inicio' });
  if (r === 'REGISTRO' || r === 'ADMINISTRACION') bnavItems.push({ view: 'reg-doc', icon: '📄', label: 'Registrar' });
  if (r === 'CONSULTA' || r === 'ADMINISTRACION') bnavItems.push({ view: 'cons-doc', icon: '🔍', label: 'Consultar' });
  if (r === 'ADMINISTRACION') bnavItems.push({ view: 'adm-periodos', icon: '📅', label: 'Periodos' });
  bnavItems.push({ view: '__menu__', icon: '☰', label: 'Más' });

  const bnavContainer = document.getElementById('bottom-nav-items');
  if (bnavContainer) {
    bnavContainer.innerHTML = bnavItems.map(item =>
      '<div class="bottom-nav-item ' + (state.view === item.view ? 'active' : '') + '" data-bnav="' + item.view + '">' +
        '<span class="bnav-icon">' + item.icon + '</span>' + item.label +
      '</div>'
    ).join('');
    bnavContainer.querySelectorAll('[data-bnav]').forEach(el => {
      el.addEventListener('click', async () => {
        const v = el.dataset.bnav;
        if (v === '__menu__') { openDrawer(); return; }
        if (v === 'cons-doc') setState({ view: v, searchResults: null, searchRfc: '' });
        else setState({ view: v, alert: null });
        if (['adm-docs', 'reg-doc'].includes(v)) {
          const [periodos, documentos, stats] = await Promise.all([loadPeriodos(), loadDocumentos(), loadStats()]);
          setState({ periodos, documentos, stats });
        }
        if (v === 'adm-usuarios') setState({ usuariosList: [] });
      });
    });
  }
}

function openDrawer() {
  document.getElementById('drawer-overlay')?.classList.add('open');
  document.getElementById('drawer')?.classList.add('open');
}
function closeDrawer() {
  document.getElementById('drawer-overlay')?.classList.remove('open');
  document.getElementById('drawer')?.classList.remove('open');
}

// ── SUPABASE HELPERS ──
async function loadPeriodos() {
  const { data } = await sb.from('periodos').select('*').order('created_at', { ascending: false });
  return data || [];
}
async function loadDocumentos() {
  const { data } = await sb.from('documentos').select('*, periodos(nombre)').order('created_at', { ascending: false });
  return data || [];
}
async function loadUsuarios() {
  try {
    const { data, error } = await sb.rpc('list_users');
    if (error || !data) {
      // fallback: get from our own usuarios table if exists
      return [];
    }
    return data;
  } catch(e) { return []; }
}

async function loadStats() {
  const [d, p] = await Promise.all([
    sb.from('documentos').select('id', { count: 'exact', head: true }),
    sb.from('periodos').select('id', { count: 'exact', head: true }),
  ]);
  return { docs: d.count || 0, periodos: p.count || 0 };
}

// ── AUTH ──
async function login(email, password) {
  setState({ loading: true, alert: null });
  const { data, error } = await sb.auth.signInWithPassword({ email, password });
  if (error) {
    setState({ loading: false, alert: { type: 'error', msg: 'Credenciales incorrectas. Verifica tu correo y contraseña.' } });
    return;
  }
  const role = data.user?.user_metadata?.role || 'CONSULTA';
  const [periodos, documentos, stats] = await Promise.all([loadPeriodos(), loadDocumentos(), loadStats()]);
  setState({ user: data.user, role, view: 'dashboard', loading: false, periodos, documentos, stats });
}

async function logout() {
  await sb.auth.signOut();
  setState({ user: null, role: null, view: 'dashboard', alert: null });
}

function render() {
  const app = document.getElementById('app');
  if (!state.user) { app.innerHTML = renderLogin(); bindLogin(); return; }
  app.innerHTML = renderApp();
  bindApp();
}

function renderLogin() {
  return `
  <div class="login-bg">
    <div class="login-card">
      <div class="login-header">
        <div class="login-logos">
          <div class="login-logo-circle">ITSLP</div>
          <div class="login-logo-tecnm">TecNM</div>
        </div>
        <div class="login-title">Sistema de Gestión de Documentos</div>
        <div class="login-sub">Instituto Tecnológico de San Luis Potosí</div>
      </div>
      <div class="login-body">
        ${state.alert ? `<div class="alert alert-${state.alert.type}">⚠️ ${state.alert.msg}</div>` : ''}
        <div class="form-group">
          <label class="form-label">CORREO ELECTRÓNICO</label>
          <input class="form-input" id="login-email" type="email" placeholder="usuario@itslp.edu.mx" />
        </div>
        <div class="form-group">
          <label class="form-label">CONTRASEÑA</label>
          <input class="form-input" id="login-pass" type="password" placeholder="••••••••" />
        </div>
        <button class="btn-primary" id="btn-login" ${state.loading ? 'disabled' : ''}>
          ${state.loading ? '<span class="spinner"></span>' : '🔐 INICIAR SESIÓN'}
        </button>

      </div>
    </div>
  </div>`;
}

function bindLogin() {
  document.getElementById('btn-login')?.addEventListener('click', () => {
    const email = document.getElementById('login-email').value.trim();
    const pass = document.getElementById('login-pass').value;
    if (!email || !pass) { setState({ alert: { type: 'error', msg: 'Completa todos los campos.' } }); return; }
    login(email, pass);
  });
  document.getElementById('login-pass')?.addEventListener('keydown', e => {
    if (e.key === 'Enter') document.getElementById('btn-login').click();
  });
}

function getNavItems() {
  const r = state.role;
  const sections = [];
  sections.push({ title: 'Principal', items: [{ view: 'dashboard', icon: '🏠', label: 'Inicio' }] });
  if (r === 'REGISTRO' || r === 'ADMINISTRACION') {
    sections.push({ title: 'Registro', items: [{ view: 'reg-doc', icon: '📄', label: 'Registrar Documento' }] });
  }
  if (r === 'CONSULTA' || r === 'ADMINISTRACION') {
    sections.push({ title: 'Consulta', items: [{ view: 'cons-doc', icon: '🔍', label: 'Consultar por RFC' }] });
  }
  if (r === 'ADMINISTRACION') {
    sections.push({ title: 'Administración', items: [
      { view: 'adm-periodos', icon: '📅', label: 'Periodos' },
      { view: 'adm-usuarios', icon: '👥', label: 'Usuarios' },
      { view: 'adm-docs', icon: '📋', label: 'Todos los Documentos' },
    ]});
  }
  return sections;
}

function renderDrawer() {
  const navItems = getNavItems();
  return `
  <div class="drawer-overlay" id="drawer-overlay">
    <div class="drawer" id="drawer">
      <div class="drawer-header">
        <span>📋 MENÚ</span>
        <button class="drawer-close-btn" id="drawer-close">✕</button>
      </div>
      ${navItems.map(section => `
        <div class="sidebar-section">
          <div class="sidebar-section-title">${section.title}</div>
          ${section.items.map(item => `
            <div class="nav-item ${state.view === item.view ? 'active' : ''}" data-view="${item.view}" data-drawer="true">
              <span class="nav-icon">${item.icon}</span> ${item.label}
            </div>
          `).join('')}
        </div>
      `).join('')}
    </div>
  </div>`;
}

function renderBottomNav() {
  const r = state.role;
  const items = [];
  items.push({ view: 'dashboard', icon: '🏠', label: 'Inicio' });
  if (r === 'REGISTRO' || r === 'ADMINISTRACION') items.push({ view: 'reg-doc', icon: '📄', label: 'Registrar' });
  if (r === 'CONSULTA' || r === 'ADMINISTRACION') items.push({ view: 'cons-doc', icon: '🔍', label: 'Consultar' });
  if (r === 'ADMINISTRACION') items.push({ view: 'adm-periodos', icon: '📅', label: 'Periodos' });
  items.push({ view: '__menu__', icon: '☰', label: 'Más' });
  return `
  <nav class="bottom-nav">
    <div class="bottom-nav-items">
      ${items.map(item => `
        <div class="bottom-nav-item ${state.view === item.view ? 'active' : ''}" data-bnav="${item.view}">
          <span class="bnav-icon">${item.icon}</span>${item.label}
        </div>
      `).join('')}
    </div>
  </nav>`;
}

function renderView() {
  switch(state.view) {
    case 'dashboard': return renderDashboard();
    case 'reg-doc': return renderRegDoc();
    case 'cons-doc': return renderConsDoc();
    case 'adm-periodos': return renderAdmPeriodos();
    case 'adm-usuarios': return renderAdmUsuarios();
    case 'adm-docs': return renderAdmDocs();
    default: return renderDashboard();
  }
}

// ── DASHBOARD ──
function renderDashboard() {
  const { docs, periodos } = state.stats;
  const roleInfo = {
    REGISTRO: { desc: 'Puedes registrar nuevos documentos en el sistema.', icon: '📄' },
    CONSULTA: { desc: 'Puedes consultar documentos por RFC y visualizar PDFs.', icon: '🔍' },
    ADMINISTRACION: { desc: 'Acceso completo: gestión de documentos, periodos y usuarios.', icon: '⚙️' },
  };
  const info = roleInfo[state.role] || roleInfo.CONSULTA;
  return `
  <div class="page-title">${info.icon} Panel Principal</div>
  <div class="stats-grid">
    <div class="stat-card">
      <div class="stat-icon">📄</div>
      <div><div class="stat-val">${docs}</div><div class="stat-label">Documentos Registrados</div></div>
    </div>
    <div class="stat-card">
      <div class="stat-icon">📅</div>
      <div><div class="stat-val">${periodos}</div><div class="stat-label">Periodos Activos</div></div>
    </div>
    <div class="stat-card">
      <div class="stat-icon">👤</div>
      <div><div class="stat-val">${state.role}</div><div class="stat-label">Tu Perfil de Acceso</div></div>
    </div>
  </div>
  <div class="card">
    <div class="card-title">🎓 Bienvenido al Sistema de Gestión de Documentos – ITSLP</div>
    <div class="alert alert-info" style="margin-bottom:0;">${info.desc}</div>
  </div>`;
}

// ── REGISTRO DE DOCUMENTO ──
function renderRegDoc() {
  const periodosOpts = state.periodos.map(p =>
    `<option value="${p.id}">${p.nombre}</option>`).join('');
  return `
  <div class="page-title">📄 Registrar Documento</div>
  <div class="card">
    <div class="card-title">Formulario de Registro de Documento</div>
    <div class="form-grid">
      <div class="form-group">
        <label class="form-label">NOMBRE COMPLETO *</label>
        <input class="form-input" id="f-nombre" type="text" placeholder="Nombre del titular" />
        <div class="error-msg" id="e-nombre"></div>
      </div>
      <div class="form-group">
        <label class="form-label">RFC *</label>
        <input class="form-input" id="f-rfc" type="text" placeholder="XXXX000000XXX" maxlength="13" style="text-transform:uppercase" />
        <div class="error-msg" id="e-rfc"></div>
      </div>
      <div class="form-group">
        <label class="form-label">PERIODO *</label>
        <select class="form-select" id="f-periodo">
          <option value="">— Selecciona un periodo —</option>
          ${periodosOpts}
        </select>
        <div class="error-msg" id="e-periodo"></div>
      </div>
      <div class="form-group">
        <label class="form-label">NOMBRE DEL DOCUMENTO *</label>
        <input class="form-input" id="f-nomdoc" type="text" placeholder="Ej. Constancia de estudios" />
        <div class="error-msg" id="e-nomdoc"></div>
      </div>
      <div class="form-group full">
        <label class="form-label">ARCHIVO PDF *</label>
        <div class="file-upload" id="file-drop">
          <input type="file" id="f-archivo" accept=".pdf" />
          <div class="file-upload-icon">📂</div>
          <div class="file-upload-text">Haz clic o arrastra tu archivo PDF aquí</div>
          <div class="file-name" id="fname-display"></div>
        </div>
        <div class="error-msg" id="e-archivo"></div>
      </div>
    </div>
    <div class="btn-row">
      <button class="btn btn-cancel" id="btn-clear-doc">🗑️ Limpiar</button>
      <button class="btn btn-save" id="btn-save-doc">💾 Guardar Documento</button>
    </div>
  </div>`;
}

// ── CONSULTA POR RFC ──
function renderConsDoc() {
  const results = state.searchResults;
  const esConsulta = state.role === 'CONSULTA';
  const rfcUsuario = state.user?.user_metadata?.rfc || '';
  const periodosOpts = state.periodos.map(p =>
    '<option value="' + p.id + '">' + p.nombre + '</option>').join('');

  let resultsHtml = '';
  if (results !== null) {
    if (results.length === 0) {
      resultsHtml = '<div class="card"><div class="empty"><div class="empty-icon">📭</div><div class="empty-text">No se encontraron documentos para el periodo seleccionado</div></div></div>';
    } else {
      const rows = results.map(d =>
        '<tr>' +
        '<td><strong>' + d.nombre_documento + '</strong></td>' +
        '<td><span class="tag tag-dorado">' + (d.periodos?.nombre || '—') + '</span></td>' +
        '<td>' + new Date(d.created_at).toLocaleDateString('es-MX') + '</td>' +
        '<td>' + (d.ruta_archivo
          ? '<button class="btn btn-view" data-url="' + d.ruta_archivo + '" data-title="' + d.nombre_documento + '">👁️ Ver PDF</button>'
          : '<span style="color:var(--gris-texto);font-size:0.8rem;">Sin archivo</span>') +
        '</td></tr>'
      ).join('');

      // Si es admin también muestra nombre y RFC
      const adminRows = results.map(d =>
        '<tr>' +
        '<td>' + d.nombre + '</td>' +
        '<td><span class="tag tag-azul">' + d.rfc + '</span></td>' +
        '<td><strong>' + d.nombre_documento + '</strong></td>' +
        '<td><span class="tag tag-dorado">' + (d.periodos?.nombre || '—') + '</span></td>' +
        '<td>' + new Date(d.created_at).toLocaleDateString('es-MX') + '</td>' +
        '<td>' + (d.ruta_archivo
          ? '<button class="btn btn-view" data-url="' + d.ruta_archivo + '" data-title="' + d.nombre_documento + '">👁️ Ver PDF</button>'
          : '<span style="color:var(--gris-texto);font-size:0.8rem;">Sin archivo</span>') +
        '</td></tr>'
      ).join('');

      if (esConsulta) {
        resultsHtml = '<div class="card"><div class="card-title">📋 Mis documentos: ' + results.length + ' encontrado(s)</div>' +
          '<div class="table-wrap"><table>' +
          '<thead><tr><th>Documento</th><th>Periodo</th><th>Fecha</th><th>Acciones</th></tr></thead>' +
          '<tbody>' + rows + '</tbody></table></div></div>';
      } else {
        resultsHtml = '<div class="card"><div class="card-title">📋 Resultados: ' + results.length + ' documento(s) encontrado(s)</div>' +
          '<div class="table-wrap"><table>' +
          '<thead><tr><th>Nombre</th><th>RFC</th><th>Documento</th><th>Periodo</th><th>Fecha</th><th>Acciones</th></tr></thead>' +
          '<tbody>' + adminRows + '</tbody></table></div></div>';
      }
    }
  }

  // Vista para perfil CONSULTA: solo selecciona periodo
  if (esConsulta) {
    return '<div class="page-title">📄 Mis Documentos</div>' +
      '<div class="card">' +
      '<div class="alert alert-info" style="margin-bottom:1rem;">👤 Bienvenido <strong>' + (state.user?.user_metadata?.nombre || '') + '</strong> — RFC: <strong>' + rfcUsuario + '</strong></div>' +
      '<div class="card-title">Filtrar por Periodo</div>' +
      '<div class="search-bar">' +

// ── BIND EVENTS ──
function bindApp() {
  document.getElementById('btn-logout')?.addEventListener('click', logout);

  // Sidebar nav (desktop)
  document.querySelectorAll('.sidebar .nav-item[data-view]').forEach(el => {
    el.addEventListener('click', async () => {
      const v = el.dataset.view;
      if (v === 'cons-doc') setState({ view: v, searchResults: null, searchRfc: '' });
      else setState({ view: v, alert: null });
      if (['adm-docs', 'reg-doc'].includes(v)) {
        const [periodos, documentos, stats] = await Promise.all([loadPeriodos(), loadDocumentos(), loadStats()]);
        setState({ periodos, documentos, stats });
      }
      if (v === 'adm-usuarios') setState({ usuariosList: [] });
    });
  });

  // PDF viewer
  document.querySelectorAll('[data-url]').forEach(btn => {
    btn.addEventListener('click', () => setState({ pdfUrl: btn.dataset.url, pdfTitle: btn.dataset.title }));
  });
  document.getElementById('close-pdf')?.addEventListener('click', () => setState({ pdfUrl: null, pdfTitle: null }));
  document.getElementById('pdf-overlay')?.addEventListener('click', e => {
    if (e.target.id === 'pdf-overlay') setState({ pdfUrl: null, pdfTitle: null });
  });

  // Registro de documento
  if (state.view === 'reg-doc') bindRegDoc();
  if (state.view === 'cons-doc') bindConsDoc();
  if (state.view === 'adm-periodos') bindAdmPeriodos();
  if (state.view === 'adm-docs') bindAdmDocs();
  if (state.view === 'adm-usuarios') bindAdmUsuarios();

  // Hamburger / Drawer
  const openDrawer = () => {
    document.getElementById('drawer-overlay')?.classList.add('open');
    document.getElementById('drawer')?.classList.add('open');
  };
  const closeDrawer = () => {
    document.getElementById('drawer-overlay')?.classList.remove('open');
    document.getElementById('drawer')?.classList.remove('open');
  };
  document.getElementById('btn-hamburger')?.addEventListener('click', openDrawer);
  document.getElementById('drawer-close')?.addEventListener('click', closeDrawer);
  document.getElementById('drawer-overlay')?.addEventListener('click', e => {
    if (e.target.id === 'drawer-overlay') closeDrawer();
  });

  // Drawer nav items
  document.querySelectorAll('.nav-item[data-drawer]').forEach(el => {
    el.addEventListener('click', async () => {
      closeDrawer();
      const v = el.dataset.view;
      if (v === 'cons-doc') setState({ view: v, searchResults: null, searchRfc: '' });
      else setState({ view: v, alert: null });
      if (['adm-docs', 'reg-doc'].includes(v)) {
        const [periodos, documentos, stats] = await Promise.all([loadPeriodos(), loadDocumentos(), loadStats()]);
        setState({ periodos, documentos, stats });
      }
    });
  });

  // Bottom nav
  document.querySelectorAll('[data-bnav]').forEach(el => {
    el.addEventListener('click', async () => {
      const v = el.dataset.bnav;
      if (v === '__menu__') { openDrawer(); return; }
      if (v === 'cons-doc') setState({ view: v, searchResults: null, searchRfc: '' });
      else setState({ view: v, alert: null });
      if (['adm-docs', 'reg-doc'].includes(v)) {
        const [periodos, documentos, stats] = await Promise.all([loadPeriodos(), loadDocumentos(), loadStats()]);
        setState({ periodos, documentos, stats });
      }
    });
  });

  // File name display
  document.getElementById('f-archivo')?.addEventListener('change', e => {
    const file = e.target.files[0];
    const el = document.getElementById('fname-display');
    if (el && file) el.textContent = '✅ ' + file.name;
  });
}

function bindRegDoc() {
  document.getElementById('btn-clear-doc')?.addEventListener('click', () => {
    ['f-nombre','f-rfc','f-periodo','f-nomdoc'].forEach(id => {
      const el = document.getElementById(id);
      if (el) el.value = '';
    });
    document.getElementById('f-archivo').value = '';
    document.getElementById('fname-display').textContent = '';
    ['e-nombre','e-rfc','e-periodo','e-nomdoc','e-archivo'].forEach(id => {
      const el = document.getElementById(id);
      if (el) el.textContent = '';
    });
  });

  document.getElementById('btn-save-doc')?.addEventListener('click', async () => {
    const nombre = document.getElementById('f-nombre').value.trim();
    const rfc = document.getElementById('f-rfc').value.trim().toUpperCase();
    const periodo_id = document.getElementById('f-periodo').value;
    const nombre_documento = document.getElementById('f-nomdoc').value.trim();
    const archivo = document.getElementById('f-archivo').files[0];
    let valid = true;

    // Validaciones
    if (!nombre) { document.getElementById('e-nombre').textContent = 'El nombre es requerido.'; valid = false; }
    else document.getElementById('e-nombre').textContent = '';

    const rfcReg = /^[A-ZÑ&]{3,4}\d{6}[A-Z0-9]{3}$/;
    if (!rfc) { document.getElementById('e-rfc').textContent = 'El RFC es requerido.'; valid = false; }
    else if (!rfcReg.test(rfc)) { document.getElementById('e-rfc').textContent = 'RFC inválido. Formato: XXXX000000XXX'; valid = false; }
    else document.getElementById('e-rfc').textContent = '';

    if (!periodo_id) { document.getElementById('e-periodo').textContent = 'Selecciona un periodo.'; valid = false; }
    else document.getElementById('e-periodo').textContent = '';

    if (!nombre_documento) { document.getElementById('e-nomdoc').textContent = 'El nombre del documento es requerido.'; valid = false; }
    else document.getElementById('e-nomdoc').textContent = '';

    if (!archivo) { document.getElementById('e-archivo').textContent = 'Debes seleccionar un archivo PDF.'; valid = false; }
    else if (archivo.type !== 'application/pdf') { document.getElementById('e-archivo').textContent = 'Solo se aceptan archivos PDF.'; valid = false; }
    else document.getElementById('e-archivo').textContent = '';

    if (!valid) return;

    const btn = document.getElementById('btn-save-doc');
    btn.disabled = true;
    btn.innerHTML = '<span class="spinner"></span> Guardando...';

    try {
      // Subir PDF a Supabase Storage
      const ext = archivo.name.split('.').pop();
      const filePath = `${rfc}/${Date.now()}_${nombre_documento.replace(/\s+/g,'_')}.${ext}`;
      const { error: upErr } = await sb.storage.from('documentos').upload(filePath, archivo);
      if (upErr) throw new Error('Error al subir el archivo: ' + upErr.message);

      const { data: urlData } = sb.storage.from('documentos').getPublicUrl(filePath);
      const ruta_archivo = urlData.publicUrl;

      const { error: insErr } = await sb.from('documentos').insert([
        { nombre, rfc, periodo_id, nombre_documento, ruta_archivo }
      ]);
      if (insErr) throw new Error('Error al guardar: ' + insErr.message);

      const [periodos, documentos, stats] = await Promise.all([loadPeriodos(), loadDocumentos(), loadStats()]);
      setState({ alert: { type: 'success', msg: `Documento "${nombre_documento}" registrado exitosamente.` }, periodos, documentos, stats });
    } catch(err) {
      setState({ alert: { type: 'error', msg: err.message } });
    }
  });
}

function bindConsDoc() {
  const esConsulta = state.role === 'CONSULTA';
  const rfcUsuario = state.user?.user_metadata?.rfc || '';

  document.getElementById('btn-clear-search')?.addEventListener('click', () => {
    const rfcEl = document.getElementById('search-rfc');
    const perEl = document.getElementById('search-periodo');
    if (rfcEl) rfcEl.value = '';
    if (perEl) perEl.value = '';
    setState({ searchResults: null, searchRfc: '' });
  });

  document.getElementById('btn-do-search')?.addEventListener('click', async () => {
    const periodo_id = document.getElementById('search-periodo')?.value || '';

    let rfc = '';
    if (esConsulta) {
      // Perfil CONSULTA: usa su propio RFC automáticamente
      rfc = rfcUsuario;
      if (!rfc) {
        setState({ alert: { type: 'error', msg: 'Tu perfil no tiene RFC registrado. Contacta al administrador.' } });
        return;
      }
    } else {
      // Administrador: usa el RFC del input
      rfc = document.getElementById('search-rfc')?.value.trim().toUpperCase() || '';
      if (!rfc && !periodo_id) {
        setState({ alert: { type: 'error', msg: 'Ingresa al menos un RFC o selecciona un periodo.' } });
        return;
      }
    }

    setState({ loading: true, alert: null });

    let query = sb.from('documentos').select('*, periodos(nombre)').order('created_at', { ascending: false });
    if (rfc) query = query.ilike('rfc', rfc);
    if (periodo_id) query = query.eq('periodo_id', periodo_id);

    const { data } = await query;
    setState({ loading: false, searchResults: data || [], searchRfc: rfc });
  });

  document.getElementById('search-rfc')?.addEventListener('keydown', e => {
    if (e.key === 'Enter') document.getElementById('btn-do-search').click();
  });
}

function bindAdmPeriodos() {
  document.getElementById('btn-save-periodo')?.addEventListener('click', async () => {
    const nombre = document.getElementById('p-nombre').value.trim();
    if (!nombre) { document.getElementById('ep-nombre').textContent = 'El nombre es requerido.'; return; }
    document.getElementById('ep-nombre').textContent = '';
    const activo = document.getElementById('p-activo').value === 'true';
    const fecha_inicio = document.getElementById('p-inicio').value || null;
    const fecha_fin = document.getElementById('p-fin').value || null;

    const btn = document.getElementById('btn-save-periodo');
    btn.disabled = true; btn.innerHTML = '<span class="spinner"></span>';
    const { error } = await sb.from('periodos').insert([{ nombre, activo, fecha_inicio, fecha_fin }]);
    if (error) { setState({ alert: { type: 'error', msg: error.message } }); btn.disabled = false; btn.innerHTML = '➕ Agregar Periodo'; return; }
    const [periodos, stats] = await Promise.all([loadPeriodos(), loadStats()]);
    setState({ alert: { type: 'success', msg: `Periodo "${nombre}" agregado correctamente.` }, periodos, stats });
  });

  document.querySelectorAll('[data-del-periodo]').forEach(btn => {
    btn.addEventListener('click', async () => {
      if (!confirm('¿Eliminar este periodo?')) return;
      const id = btn.dataset.delPeriodo;
      await sb.from('periodos').delete().eq('id', id);
      const [periodos, stats] = await Promise.all([loadPeriodos(), loadStats()]);
      setState({ alert: { type: 'success', msg: 'Periodo eliminado.' }, periodos, stats });
    });
  });
}

function bindAdmDocs() {
  document.querySelectorAll('[data-del-doc]').forEach(btn => {
    btn.addEventListener('click', async () => {
      if (!confirm('¿Eliminar este documento?')) return;
      const id = btn.dataset.delDoc;
      const path = btn.dataset.path;
      if (path) {
        const url = new URL(path);
        const parts = url.pathname.split('/documentos/');
        if (parts[1]) await sb.storage.from('documentos').remove([parts[1]]);
      }
      await sb.from('documentos').delete().eq('id', id);
      const [documentos, stats] = await Promise.all([loadDocumentos(), loadStats()]);
      setState({ alert: { type: 'success', msg: 'Documento eliminado.' }, documentos, stats });
    });
  });
}

    else document.getElementById('eu-email').textContent = '';

    if (!pass) { document.getElementById('eu-pass').textContent = 'La contraseña es requerida.'; valid = false; }
    else if (pass.length < 8) { document.getElementById('eu-pass').textContent = 'Mínimo 8 caracteres.'; valid = false; }
    else document.getElementById('eu-pass').textContent = '';

    if (!pass2) { document.getElementById('eu-pass2').textContent = 'Confirma la contraseña.'; valid = false; }
    else if (pass !== pass2) { document.getElementById('eu-pass2').textContent = 'Las contraseñas no coinciden.'; valid = false; }
    else document.getElementById('eu-pass2').textContent = '';

    if (!valid) return;

    const btn = document.getElementById('btn-save-user');
    btn.disabled = true;
    btn.innerHTML = '<span class="spinner"></span> Creando...';

    try {
      const response = await fetch('/api/create-user', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ email, password: pass, role: rol, nombre, rfc })
      });
      const result = await response.json();
      if (!response.ok) throw new Error(result.error || 'Error al crear usuario');

      // Mostrar éxito sin re-renderizar
      const ua = document.getElementById('u-alert');
      if (ua) ua.innerHTML = '<div class="alert alert-success">✅ Usuario ' + email + ' creado correctamente con perfil ' + rol + '.</div>';

      // Limpiar formulario
      ['u-nombre','u-email','u-rfc','u-pass','u-pass2'].forEach(id => {
        const el = document.getElementById(id);
        if (el) el.value = '';
      });
      btn.disabled = false;
      btn.innerHTML = '👤 Crear Usuario';

      // Recargar tabla de usuarios
      cargarUsuarios();

    } catch(err) {
      const ua = document.getElementById('u-alert');
      if (ua) ua.innerHTML = '<div class="alert alert-error">❌ Error al crear usuario: ' + err.message + '</div>';
      btn.disabled = false;
      btn.innerHTML = '👤 Crear Usuario';
    }
  });
}

async function cargarUsuarios() {
  const container = document.getElementById('usuarios-table-container');
  if (container) container.innerHTML = '<div class="empty"><div class="empty-icon">⏳</div><div class="empty-text">Cargando...</div></div>';
  try {
    const { data, error } = await sb.rpc('get_users_list');
    if (!error && data) {
      renderUsuariosTable(data);
      return;
    }
  } catch(e) {}
  // Fallback: mostrar solo usuario actual
  renderUsuariosTable([{
    email: state.user?.email,
    nombre: 'Administrador',
    role: state.role,
    created_at: state.user?.created_at || new Date().toISOString()
  }]);
}

// ── EDITAR USUARIO ──
function abrirEditarUsuario(u) {

  // Remove existing modal if any
  document.getElementById('edit-user-modal')?.remove();

  const modal = document.createElement('div');
  modal.className = 'edit-modal-overlay';
  modal.id = 'edit-user-modal';
  modal.innerHTML =
    '<div class="edit-modal">' +
      '<div class="edit-modal-header">' +
        '<span class="edit-modal-title">✏️ Editar Usuario</span>' +
        '<button class="modal-close" id="edit-modal-close">✕</button>' +
      '</div>' +
      '<div class="edit-modal-body">' +
        '<div id="edit-alert"></div>' +
        '<div class="form-grid">' +
          '<div class="form-group">' +
            '<label class="form-label">NOMBRE COMPLETO *</label>' +
            '<input class="form-input" id="edit-nombre" type="text" value="' + (u.nombre || '') + '" />' +
            '<div class="error-msg" id="edit-e-nombre"></div>' +
          '</div>' +
          '<div class="form-group">' +
            '<label class="form-label">RFC *</label>' +
            '<input class="form-input" id="edit-rfc" type="text" value="' + (u.rfc || '') + '" maxlength="13" style="text-transform:uppercase" />' +
            '<div class="error-msg" id="edit-e-rfc"></div>' +
          '</div>' +
          '<div class="form-group">' +
            '<label class="form-label">CORREO ELECTRÓNICO *</label>' +
            '<input class="form-input" id="edit-email" type="email" value="' + (u.email || '') + '" />' +
            '<div class="error-msg" id="edit-e-email"></div>' +
          '</div>' +
          '<div class="form-group">' +
            '<label class="form-label">PERFIL DE ACCESO *</label>' +
            '<select class="form-select" id="edit-rol">' +
              '<option value="CONSULTA"' + (u.role === 'CONSULTA' ? ' selected' : '') + '>CONSULTA</option>' +
              '<option value="REGISTRO"' + (u.role === 'REGISTRO' ? ' selected' : '') + '>REGISTRO</option>' +
              '<option value="ADMINISTRACION"' + (u.role === 'ADMINISTRACION' ? ' selected' : '') + '>ADMINISTRACIÓN</option>' +
            '</select>' +
          '</div>' +
          '<div class="form-group full">' +
            '<label class="form-label">NUEVA CONTRASEÑA <span style="color:var(--gris-texto);font-weight:400">(dejar vacío para no cambiar)</span></label>' +
            '<input class="form-input" id="edit-pass" type="password" placeholder="Mínimo 8 caracteres" autocomplete="new-password" />' +
            '<div class="error-msg" id="edit-e-pass"></div>' +
          '</div>' +
        '</div>' +
      '</div>' +
      '<div class="edit-modal-footer">' +
        '<button class="btn btn-cancel" id="edit-cancel-btn">Cancelar</button>' +
        '<button class="btn btn-save" id="edit-save-btn">💾 Guardar Cambios</button>' +
      '</div>' +
    '</div>';

  document.body.appendChild(modal);

  // Close handlers
  const cerrar = () => modal.remove();
  document.getElementById('edit-modal-close').addEventListener('click', cerrar);
  document.getElementById('edit-cancel-btn').addEventListener('click', cerrar);
  modal.addEventListener('click', e => { if (e.target === modal) cerrar(); });

  // Save handler
  document.getElementById('edit-save-btn').addEventListener('click', async () => {
    const nombre = document.getElementById('edit-nombre').value.trim();
    const rfc    = document.getElementById('edit-rfc').value.trim().toUpperCase();
    const email  = document.getElementById('edit-email').value.trim();
    const rol    = document.getElementById('edit-rol').value;
    const pass   = document.getElementById('edit-pass').value;
    let valid = true;

    if (!nombre) { document.getElementById('edit-e-nombre').textContent = 'Requerido.'; valid = false; }
    else document.getElementById('edit-e-nombre').textContent = '';

    const rfcReg = /^[A-ZÑ&]{3,4}\d{6}[A-Z0-9]{3}$/;
    if (!rfc) { document.getElementById('edit-e-rfc').textContent = 'Requerido.'; valid = false; }
    else if (!rfcReg.test(rfc)) { document.getElementById('edit-e-rfc').textContent = 'RFC inválido.'; valid = false; }
    else document.getElementById('edit-e-rfc').textContent = '';

    if (!email) { document.getElementById('edit-e-email').textContent = 'Requerido.'; valid = false; }
    else document.getElementById('edit-e-email').textContent = '';

    if (pass && pass.length < 8) { document.getElementById('edit-e-pass').textContent = 'Mínimo 8 caracteres.'; valid = false; }
    else document.getElementById('edit-e-pass').textContent = '';

    if (!valid) return;

    const btn = document.getElementById('edit-save-btn');
    btn.disabled = true;
    btn.innerHTML = '<span class="spinner"></span> Guardando...';

    try {
      const response = await fetch('/api/update-user', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ id: u.id, email, password: pass || null, role: rol, nombre, rfc })
      });
      const result = await response.json();
      if (!response.ok) throw new Error(result.error || 'Error al actualizar');

      document.getElementById('edit-alert').innerHTML = '<div class="alert alert-success">✅ Usuario actualizado correctamente.</div>';
      btn.disabled = false;
      btn.innerHTML = '💾 Guardar Cambios';

      // Reload users table after 1.5s and close
      setTimeout(() => { cerrar(); cargarUsuarios(); }, 1500);

    } catch(err) {
      document.getElementById('edit-alert').innerHTML = '<div class="alert alert-error">❌ ' + err.message + '</div>';
      btn.disabled = false;
      btn.innerHTML = '💾 Guardar Cambios';
    }
  });
}

// ── INIT ──
(async () => {
  const { data } = await sb.auth.getSession();
  if (data.session?.user) {
    const u = data.session.user;
    const role = u.user_metadata?.role || 'CONSULTA';
    const [periodos, documentos, stats] = await Promise.all([loadPeriodos(), loadDocumentos(), loadStats()]);
    setState({ user: u, role, periodos, documentos, stats });
  } else {
    render();
  }
})();
</script>
